name: Call Firebase Deploy (Remote Workflow)

on:
  workflow_dispatch:

jobs:
  deploy:
    uses: TechArtists/backend-firebase-function-save-payload/.github/workflows/firebaseFunctionDeploy.yml@main
    with:
      function-name: savePayload
      projects: "dietbet-staging"
      target-bucket: appex_app_payloads
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
